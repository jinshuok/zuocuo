<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zuocuo - 不怕做错</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .grids-section { padding: 48px 24px 64px; }
    .grids-container { max-width: 1320px; margin: 0 auto; }
    .grids-title {
      font-size: 24px;
      font-weight: 600;
      color: #181E25;
      margin-bottom: 32px;
      text-align: center;
    }
    .grids-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 768px) {
      .grids-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .grids-section { padding: 32px 16px 48px; }
    }
    .grid-item {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .grid-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }
    .grid-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .grid-item .grid-title {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #181E25;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .grids-loading {
      text-align: center;
      color: #86909C;
      padding: 40px;
    }

    /* ========== 轮盘轮播图样式 ========== */
    .wheel-slide .slide-content {
      position: relative;
      overflow: hidden;
    }
    .wheel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .wheel-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70%;
      overflow: visible;
      user-select: none;
    }
    .wheel-track {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 1200px;
    }
    .wheel-item {
      position: absolute;
      width: 170px;
      height: 230px;
      left: 50%;
      top: 50%;
      margin-left: -85px;
      margin-top: -115px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.4s ease,
                  z-index 0s;
      will-change: transform, opacity;
    }
    .wheel-item-inner {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: #c7b0fe;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .wheel-item-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .wheel-item a {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
    }
    .wheel-item.active .wheel-item-inner {
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .wheel-item.active .wheel-item-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      border: 3px solid rgba(255,255,255,0.6);
      pointer-events: none;
    }
    .wheel-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 20;
    }
    @media (max-width: 768px) {
      .wheel-item {
        width: 120px;
        height: 164px;
        margin-left: -60px;
        margin-top: -82px;
      }
      .wheel-container {
        height: 65%;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="nav-inner">
      <a href="/" class="logo">zuocuo</a>
      <span class="tagline">不怕做错</span>
    </div>
  </header>

  <!-- 主内容 -->
  <main>
    <section class="hero-section">
      <div class="hero-container">
        <div class="swiper hero-swiper">
          <div class="swiper-wrapper" id="bannerWrapper">
            <div class="swiper-slide">
              <div class="banner-loading">加载中...</div>
            </div>
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      </div>
    </section>

    <section class="grids-section">
      <div class="grids-container">
        <div class="grids-grid" id="gridsWrapper">
          <div class="grids-loading">加载中...</div>
        </div>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="copyright">© 2024 zuocuo. 通过kimi agent更新. All rights reserved.</span>
      <a href="/admin.html" class="admin-link">管理入口</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    let swiperInstance = null;
    const wheelInstances = [];

    async function loadBanners() {
      try {
        const res = await fetch('/api/banners/list');
        const data = await res.json();
        const banners = data.banners || [];
        const wrapper = document.getElementById('bannerWrapper');

        if (banners.length === 0) {
          wrapper.innerHTML = `
            <div class="swiper-slide">
              <div class="slide-content">
                <div class="slide-text">
                  <h1 class="slide-title"><span class="brand">zuocuo</span></h1>
                  <p class="slide-subtitle">不怕做错，勇敢尝试</p>
                  <div class="slide-buttons">
                    <a href="/admin.html" class="btn btn-primary">开始管理</a>
                  </div>
                </div>
                <div class="slide-media" style="background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);"></div>
              </div>
            </div>
          `;
        } else {
          wrapper.innerHTML = banners.map((b, idx) => {
            if (b.type === 'wheel') {
              return renderWheelSlide(b, idx);
            }
            return `
            <div class="swiper-slide">
              <div class="slide-content">
                <div class="slide-text">
                  <h1 class="slide-title">${escapeHtml(b.title)}</h1>
                  ${b.subtitle ? `<p class="slide-subtitle">${escapeHtml(b.subtitle)}</p>` : ''}
                  <div class="slide-buttons">
                    ${b.btn_link ? `<a href="${escapeHtml(b.btn_link)}" class="btn btn-primary">${escapeHtml(b.btn_text || '了解更多')}</a>` : ''}
                    ${b.link_url ? `<a href="${escapeHtml(b.link_url)}" class="btn btn-secondary">查看详情</a>` : ''}
                  </div>
                </div>
                <div class="slide-media">
                  <img src="${escapeHtml(b.image_url)}" alt="${escapeHtml(b.title)}" loading="lazy">
                </div>
              </div>
            </div>
          `;
          }).join('');
        }

        if (swiperInstance) swiperInstance.destroy(true, true);

        swiperInstance = new Swiper('.hero-swiper', {
          slidesPerView: 1,
          spaceBetween: 0,
          loop: banners.length > 1,
          autoplay: banners.length > 1 ? {
            delay: 5000,
            disableOnInteraction: false,
          } : false,
          pagination: {
            el: '.swiper-pagination',
            clickable: true,
          },
          navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
          },
          effect: 'fade',
          fadeEffect: {
            crossFade: true
          },
        });

        // 初始化所有轮盘组件
        wheelInstances.length = 0;
        document.querySelectorAll('.wheel-container[data-wheel]').forEach(container => {
          const idx = parseInt(container.dataset.wheel, 10);
          const banner = banners[idx];
          if (banner && banner.items && banner.items.length > 0) {
            wheelInstances.push(new WheelCarousel(container, banner.items));
          }
        });

        // Swiper 切换时重新计算当前轮盘位置
        swiperInstance.on('slideChange', () => {
          const activeSlide = document.querySelector('.swiper-slide-active .wheel-container');
          if (activeSlide) {
            const inst = wheelInstances.find(w => w.container === activeSlide);
            if (inst) {
              requestAnimationFrame(() => inst.updatePositions());
            }
          }
        });

        // 鼠标悬停轮盘时暂停 Swiper 自动播放
        document.querySelectorAll('.wheel-slide').forEach(slide => {
          slide.addEventListener('mouseenter', () => {
            if (swiperInstance.autoplay) swiperInstance.autoplay.stop();
          });
          slide.addEventListener('mouseleave', () => {
            if (swiperInstance.autoplay) swiperInstance.autoplay.start();
          });
        });
      } catch (err) {
        console.error('加载轮播图失败:', err);
        document.getElementById('bannerWrapper').innerHTML = `
          <div class="swiper-slide">
            <div class="banner-loading">加载失败，请刷新重试</div>
          </div>
        `;
      }
    }

    function renderWheelSlide(b, idx) {
      const items = Array.isArray(b.items) ? b.items : [];
      return `
        <div class="swiper-slide wheel-slide">
          <div class="slide-content">
            <div class="wheel-bg" style="background-image:url('${escapeHtml(b.image_url)}')"></div>
            <div class="slide-text" style="position:relative;z-index:5;">
              <h1 class="slide-title">${escapeHtml(b.title)}</h1>
              ${b.subtitle ? `<p class="slide-subtitle">${escapeHtml(b.subtitle)}</p>` : ''}
              <div class="slide-buttons">
                ${b.btn_link ? `<a href="${escapeHtml(b.btn_link)}" class="btn btn-primary">${escapeHtml(b.btn_text || '了解更多')}</a>` : ''}
                ${b.link_url ? `<a href="${escapeHtml(b.link_url)}" class="btn btn-secondary">查看详情</a>` : ''}
              </div>
            </div>
            <div class="wheel-container" data-wheel="${idx}">
              <div class="wheel-track">
                ${items.map((item, i) => `
                  <div class="wheel-item" data-index="${i}">
                    <a href="${escapeHtml(item.link_url || '#')}" target="_blank" draggable="false">
                      <div class="wheel-item-inner">
                        <img src="${escapeHtml(item.image_url)}" alt="" draggable="false" loading="lazy">
                      </div>
                    </a>
                  </div>
                `).join('')}
              </div>
              <div class="wheel-hint">滚动鼠标旋转轮盘</div>
            </div>
          </div>
        </div>
      `;
    }

    class WheelCarousel {
      constructor(container, items) {
        this.container = container;
        this.items = items;
        this.angleOffset = 0;
        this.itemElements = Array.from(container.querySelectorAll('.wheel-item'));
        this.isDragging = false;
        this.startY = 0;
        this.startAngle = 0;
        this._resizeHandler = () => this.updatePositions();
        this.init();
      }

      init() {
        window.addEventListener('resize', this._resizeHandler);
        this.updatePositions();

        // 鼠标滚轮
        this.container.addEventListener('wheel', (e) => {
          e.preventDefault();
          e.stopPropagation();
          this.angleOffset += e.deltaY * 0.004;
          this.updatePositions();
        }, { passive: false });

        // 触摸拖拽（移动端）
        this.container.addEventListener('touchstart', (e) => {
          this.isDragging = true;
          this.startY = e.touches[0].clientY;
          this.startAngle = this.angleOffset;
        }, { passive: true });

        this.container.addEventListener('touchmove', (e) => {
          if (!this.isDragging) return;
          const deltaY = e.touches[0].clientY - this.startY;
          this.angleOffset = this.startAngle + deltaY * 0.006;
          this.updatePositions();
        }, { passive: true });

        this.container.addEventListener('touchend', () => {
          this.isDragging = false;
        });

        // 鼠标拖拽
        this.container.addEventListener('mousedown', (e) => {
          this.isDragging = true;
          this.startY = e.clientY;
          this.startAngle = this.angleOffset;
          this.container.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
          if (!this.isDragging) return;
          const deltaY = e.clientY - this.startY;
          this.angleOffset = this.startAngle + deltaY * 0.006;
          this.updatePositions();
        });

        window.addEventListener('mouseup', () => {
          if (this.isDragging) {
            this.isDragging = false;
            this.container.style.cursor = 'default';
          }
        });
      }

      updatePositions() {
        const count = this.items.length;
        if (count === 0) return;

        const rect = this.container.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = rect.height * 0.85;
        const radiusX = Math.min(rect.width * 0.38, 420);
        const radiusY = Math.min(rect.height * 0.35, 160);

        const itemWidth = rect.width <= 768 ? 120 : 170;
        const itemHeight = rect.width <= 768 ? 164 : 230;

        this.itemElements.forEach((el, i) => {
          const baseAngle = (i / count) * Math.PI * 2;
          const angle = baseAngle + this.angleOffset;

          // 归一化到 [0, 2π]
          let normAngle = angle % (Math.PI * 2);
          if (normAngle < 0) normAngle += Math.PI * 2;

          // 相对于底部中心的角度 (底部中心 = π/2)
          let relAngle = normAngle - Math.PI / 2;
          while (relAngle > Math.PI) relAngle -= Math.PI * 2;
          while (relAngle < -Math.PI) relAngle += Math.PI * 2;

          const absAngle = Math.abs(relAngle);

          // 椭圆位置
          const x = centerX + radiusX * Math.sin(normAngle);
          const y = centerY - radiusY * Math.cos(normAngle);

          // 缩放和透明度：中心最大，两侧渐小
          const scale = Math.max(0.55, 1 - absAngle * 0.35);
          const opacity = absAngle > Math.PI / 2 ? 0 : Math.max(0.35, 1 - absAngle * 0.7);

          // 旋转：根据水平位置倾斜
          const rotate = Math.sin(normAngle) * 18;

          // z-index：中心在最前
          const zIndex = Math.round(100 - absAngle * 40);

          // 判断是否为中心项（可点击）
          const isCenter = absAngle < 0.25;

          el.style.left = `${x - itemWidth / 2}px`;
          el.style.top = `${y - itemHeight / 2}px`;
          el.style.transform = `rotate(${rotate}deg) scale(${scale})`;
          el.style.opacity = opacity;
          el.style.zIndex = zIndex;
          el.style.visibility = opacity <= 0.01 ? 'hidden' : 'visible';

          if (isCenter) {
            el.classList.add('active');
            const link = el.querySelector('a');
            if (link) link.style.pointerEvents = 'auto';
          } else {
            el.classList.remove('active');
            const link = el.querySelector('a');
            if (link) link.style.pointerEvents = 'none';
          }
        });
      }
    }

    async function loadGrids() {
      try {
        const res = await fetch('/api/grids/list');
        const data = await res.json();
        const grids = data.grids || [];
        const wrapper = document.getElementById('gridsWrapper');

        if (grids.length === 0) {
          wrapper.innerHTML = '';
          return;
        }

        wrapper.innerHTML = grids.map(g => `
          <a href="${escapeHtml(g.link_url || '#')}" class="grid-item" title="${escapeHtml(g.title)}">
            <img src="${escapeHtml(g.image_url)}" alt="${escapeHtml(g.title)}" loading="lazy">
            <div class="grid-title">${escapeHtml(g.title)}</div>
          </a>
        `).join('');
      } catch (err) {
        console.error('加载九宫格失败:', err);
        document.getElementById('gridsWrapper').innerHTML = '';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadBanners();
    loadGrids();
  </script>
</body>
</html>
